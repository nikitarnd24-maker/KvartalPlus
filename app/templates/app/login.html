{% extends "app/layout.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header" style="background-color: #78191A; color: white;">
                <h3 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>{{ title }}</h3>
            </div>
            <div class="card-body">
                <section id="loginForm">
                    <form action="." method="post" class="form-horizontal">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label">Имя пользователя</label>
                            {{ form.username }}
                        </div>

                        <div class="mb-3">
                            <label for="id_password" class="form-label">Пароль</label>
                            {{ form.password }}
                        </div>

                        <input type="hidden" name="next" value="/" />

                        <div class="d-grid gap-2">
                            <!-- Основная кнопка Войти -->
                            <button type="submit" class="btn" style="background-color: #78191A; color: white;">
                                <i class="fas fa-sign-in-alt me-2"></i>Войти в систему
                            </button>

                            <!-- Кнопка регистрации -->
                            <a href="{% url 'registration' %}" class="btn btn-warning btn-lg">
                                <i class="fas fa-user-plus me-2"></i>Зарегистрироваться
                            </a>

                            <!-- Кнопка назад -->
                            <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-2"></i>На главную
                            </a>
                        </div>

                        {% if form.errors %}
                        <div class="alert alert-danger mt-3">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            Пожалуйста, введите правильные имя пользователя и пароль.
                        </div>
                        {% endif %}
                    </form>
                </section>
            </div>
        </div>
    </div>
</div>

{% endblock %}
