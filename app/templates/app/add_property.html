{% extends "app/layout.html" %}
{% load static %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0"><i class="fas fa-plus-circle"></i> Добавить новый объект недвижимости</h3>
                </div>
                <div class="card-body">
                    {% if error %}
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle"></i> {{ error }}
                    </div>
                    {% endif %}

                    <form method="post" enctype="multipart/form-data" id="propertyForm">
                        {% csrf_token %}

                        <!-- Основная информация -->
                        <div class="mb-4">
                            <h5 class="text-primary"><i class="fas fa-info-circle"></i> Основная информация</h5>
                            <hr>

                            <div class="mb-3">
                                <label class="form-label">Название объекта *</label>
                                <input type="text" name="title" class="form-control" placeholder="Например: 3-комнатная квартира в центре" required>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Тип недвижимости *</label>
                                    <select name="property_type" id="property_type" class="form-control" required>
                                        <option value="">Выберите тип</option>
                                        <option value="apartment">Квартира</option>
                                        <option value="house">Дом</option>
                                        <option value="commercial">Коммерческая</option>
                                        <option value="land">Земельный участок</option>
                                        <option value="room">Комната</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Адрес *</label>
                                    <input type="text" name="address" class="form-control" placeholder="Полный адрес" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Цена (руб.) *</label>
                                    <input type="number" name="price" class="form-control" placeholder="Например: 8500000" required min="0">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Тип сделки *</label>
                                    <select name="deal_type" id="deal_type" class="form-control" required>
                                        <option value="sale">Продажа</option>
                                        <option value="rent">Аренда</option>
                                    </select>
                                </div>
                                <div class="col-md-4" id="utilities_container" style="display:none;">
                                    <label class="form-label">КУ (коммунальные услуги, руб.)</label>
                                    <input type="number" step="0.01" name="utilities_price" id="utilities_price" class="form-control" placeholder="Например: 5000" min="0">
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Площадь (м²) *</label>
                                    <input type="number" step="0.01" name="area" class="form-control" placeholder="Например: 75.5" required min="0">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Комнат</label>
                                    <input type="number" name="rooms" id="rooms" class="form-control" placeholder="Например: 3" min="0" value="0">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Этаж</label>
                                    <input type="text" name="floor" id="floor" class="form-control" placeholder="Например: 5/9">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Описание *</label>
                                <textarea name="description" class="form-control" rows="4" placeholder="Подробное описание объекта..." required></textarea>
                            </div>
                        </div>

                        <!-- Выбор агента -->
                        <div class="mb-3">
                            <label class="form-label">Агент (необязательно)</label>
                            <select name="agent" class="form-control">
                                <option value="">Выберите агента</option>
                                {% for agent in agents %}
                                <option value="{{ agent.id }}">{{ agent.name }} - {{ agent.position }} ({{ agent.experience }} лет опыта)</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Загрузка фотографий -->
                        <div class="mb-4">
                            <h5 class="text-primary"><i class="fas fa-images"></i> Фотографии объекта</h5>
                            <hr>

                            <div class="mb-3">
                                <label class="form-label">Загрузите фотографии *</label>
                                <input type="file" name="images" class="form-control" multiple accept="image/*" required>
                                <small class="text-muted">Можно выбрать несколько файлов. Первое фото будет главным.</small>
                            </div>
                        </div>

                        <!-- Кнопки -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="{% url 'catalog' %}" class="btn btn-secondary me-md-2"><i class="fas fa-times"></i> Отмена</a>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Добавить объект</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- JS для КУ -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const propertyTypeSelect = document.getElementById('property_type');
        const roomsField = document.getElementById('rooms');
        const floorField = document.getElementById('floor');
        const dealType = document.getElementById('deal_type');
        const utilitiesContainer = document.getElementById('utilities_container');

        function updateFieldRequirements() {
            const selectedType = propertyTypeSelect.value;
            if (selectedType === 'land') {
                roomsField.removeAttribute('required');
                roomsField.placeholder = 'Для земельных участков не обязательно';
                floorField.removeAttribute('required');
                floorField.placeholder = 'Для земельных участков не обязательно';
            } else {
                roomsField.setAttribute('required', 'required');
                roomsField.placeholder = 'Например: 3';
                floorField.removeAttribute('required');
                floorField.placeholder = 'Например: 5/9';
            }
        }

        function toggleUtilities() {
            if (dealType.value === 'rent') {
                utilitiesContainer.style.display = 'block';
            } else {
                utilitiesContainer.style.display = 'none';
            }
        }

        propertyTypeSelect.addEventListener('change', updateFieldRequirements);
        dealType.addEventListener('change', toggleUtilities);

        updateFieldRequirements();
        toggleUtilities();
    });
</script>
{% endblock %}
